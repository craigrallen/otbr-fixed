name: Build OTBR Add-on

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build aarch64 image
        uses: docker/build-push-action@v6
        with:
          context: ./openthread_border_router
          platforms: linux/arm64
          push: false
          outputs: type=docker,dest=/tmp/otbr-fixed-aarch64.tar
          build-args: |
            BUILD_ARCH=aarch64
          tags: local/otbr-fixed:aarch64

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: otbr-fixed-aarch64
          path: /tmp/otbr-fixed-aarch64.tar
          retention-days: 7
