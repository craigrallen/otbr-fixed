name: Build and Push OTBR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push aarch64
        uses: docker/build-push-action@v6
        with:
          context: ./openthread_border_router
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/otbr-fixed:aarch64
          build-args: BUILD_ARCH=aarch64
