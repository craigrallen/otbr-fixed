name: Build OTBR Add-on

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, amd64]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./openthread_border_router
          platforms: linux/${{ matrix.arch == 'aarch64' && 'arm64' || 'amd64' }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/otbr-fixed-${{ matrix.arch }}:latest
            ghcr.io/${{ github.repository_owner }}/otbr-fixed-${{ matrix.arch }}:2.16.5-fixed
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base-debian:trixie
